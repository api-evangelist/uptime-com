aid: uptime-com
url: https://raw.githubusercontent.com/api-evangelist/uptime-com/refs/heads/main/apis.yml
name: Uptime.com
kind: company
description: Uptime.com is a website, application, and infrastructure monitoring platform
  providing uptime checks, transaction and API monitoring, page speed checks, SLA reporting,
  status pages, and alerting from a global network of probe servers. Its REST API at
  https://uptime.com/api/v1 (Token authentication) lets customers programmatically manage
  checks, outages, SLA reports, status pages, contacts, integrations, and tags.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Monitoring
- Uptime
- Website Monitoring
- Status Pages
- SLA
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
