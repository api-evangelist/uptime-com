meters:
- name: checks
  description: Number of monitoring checks, the primary subscription cost driver, varying by check type and interval.
  unit: checks
  aggregation: max
  dimensions:
  - account
  - check_type
- name: status_pages
  description: Status Page module subscription, billed as a separate add-on.
  unit: subscription
  aggregation: max
  dimensions:
  - account
- name: rum
  description: Real User Monitoring add-on subscription.
  unit: subscription
  aggregation: max
  dimensions:
  - account
- name: probe_locations
  description: Additional and private probe-server locations added to a plan.
  unit: locations
  aggregation: max
  dimensions:
  - account
- name: sms_alerts
  description: SMS alert notifications, which may incur usage charges depending on plan and volume.
  unit: messages
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Review the subscription summary and check inventory in the Uptime.com account; track which checks and modules drive cost.
- name: Allocation
  description: Use tags and contact groups to map checks to teams, services, and cost centers.
- name: Optimization
  description: Pause or remove unused checks, widen intervals where appropriate, consolidate group checks, and only enable add-on modules (Status Pages, RUM, extra locations) where needed. Choose annual billing for ~20% savings.
- name: Accountability
  description: Assign owners per tag/service and review check count and module spend against budget each billing cycle.
