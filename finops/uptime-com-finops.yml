description: >-
  FinOps view of Uptime.com spend. Uptime.com bills a subscription priced by the
  number and type of monitoring checks (uptime, transaction, API, page-speed),
  with the Status Page module and Real User Monitoring sold as separate add-ons
  and additional or private probe-server locations available as paid extras.
  Subscriptions are billed monthly or annually (annual ~20% cheaper). Cost is
  driven mainly by check count, check interval/type, and the optional modules
  and locations enabled.
notes: >-
  Per-tier prices and check quotas are representative and not reconciled; verify
  against the Uptime.com pricing page during reconciliation.
